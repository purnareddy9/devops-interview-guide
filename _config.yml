title: "DevOps Interview Guide"
description: "A comprehensive interview preparation guide covering OpenShift, Kubernetes, CI/CD, Security, Monitoring, Python, and AI for DevOps — 500+ questions with full answers."
url: ""                        # set to https://<your-github-username>.github.io once you know it
baseurl: "/devops-interview-guide"   # repo name — change if different

# ── Author ───────────────────────────────────────────────
author:
  name: "DevOps Interview Guide"

# ── Jekyll build ─────────────────────────────────────────
theme: null                    # using fully custom layout — no gem theme
markdown: kramdown
highlighter: rouge
kramdown:
  input: GFM
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    css_class: "highlight"
    block:
      line_numbers: false

# ── Plugins ──────────────────────────────────────────────
plugins:
  - jekyll-relative-links
  - jekyll-seo-tag

# ── Collections ──────────────────────────────────────────
collections:
  modules:
    output: true
    permalink: /:collection/:name/

# ── Defaults ─────────────────────────────────────────────
defaults:
  - scope:
      path: ""
    values:
      layout: default
  - scope:
      path: "jd-openshift-k8s-engineer"
    values:
      layout: default
      section: "OpenShift & Kubernetes Engineer"

# ── Exclusions ───────────────────────────────────────────
exclude:
  - "*.sh"
  - "node_modules"
  - "vendor"
  - Gemfile
  - Gemfile.lock

# ── Navigation ────────────────────────────────────────────
nav_main:
  - title: "Home"
    url: "/"
  - title: "📚 Full Guide"
    url: "/README"
