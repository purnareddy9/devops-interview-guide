<header class="topbar" id="top">
  <div class="topbar-inner">

    <!-- Brand -->
    <a class="topbar-brand" href="{{ '/' | relative_url }}">
      <span class="brand-icon">🚀</span>
      <span class="brand-text">DevOps Interview Guide</span>
    </a>

    <!-- Desktop nav links -->
    <nav class="topbar-links" aria-label="Primary navigation">
      <a href="{{ '/' | relative_url }}"
         {% if page.url == '/' %}aria-current="page"{% endif %}>
        Home
      </a>
      <a href="{{ '/README' | relative_url }}"
         {% if page.url contains 'README' and page.url != '/jd-openshift-k8s-engineer/README' %}aria-current="page"{% endif %}>
        Full Guide
      </a>
      <a href="{{ '/jd-openshift-k8s-engineer/README' | relative_url }}"
         {% if page.url contains 'jd-openshift-k8s-engineer' %}aria-current="page"{% endif %}>
        OpenShift JD Prep
      </a>

      <!-- Search hint -->
      <span class="topbar-search-hint" aria-hidden="true">
        <kbd>Ctrl</kbd><kbd>F</kbd> to search
      </span>

      <!-- GitHub link -->
      <a href="https://github.com/{{ site.github_username | default: 'your-username' }}/devops-interview-guide"
         target="_blank" rel="noopener noreferrer"
         class="topbar-github"
         aria-label="View source on GitHub">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
          <path d="M12 2C6.477 2 2 6.484 2 12.017c0 4.425 2.865 8.18 6.839 9.504.5.092.682-.217.682-.483
                   0-.237-.008-.868-.013-1.703-2.782.605-3.369-1.343-3.369-1.343-.454-1.158-1.11-1.466-1.11-1.466
                   -.908-.62.069-.608.069-.608 1.003.07 1.531 1.032 1.531 1.032.892 1.53 2.341 1.088 2.91.832
                   .092-.647.35-1.088.636-1.338-2.22-.253-4.555-1.113-4.555-4.951 0-1.093.39-1.988 1.029-2.688
                   -.103-.253-.446-1.272.098-2.65 0 0 .84-.27 2.75 1.026A9.564 9.564 0 0112 6.844c.85.004
                   1.705.115 2.504.337 1.909-1.296 2.747-1.027 2.747-1.027.546 1.379.202 2.398.1 2.651.64.7
                   1.028 1.595 1.028 2.688 0 3.848-2.339 4.695-4.566 4.943.359.309.678.92.678 1.855
                   0 1.338-.012 2.419-.012 2.747 0 .268.18.58.688.482A10.019 10.019 0 0022 12.017
                   C22 6.484 17.522 2 12 2z"/>
        </svg>
        GitHub
      </a>
    </nav>

    <!-- Mobile hamburger -->
    <button class="mobile-menu-btn" id="mobileMenuBtn" aria-label="Toggle navigation menu" aria-expanded="false" aria-controls="sidebar">
      <span></span>
      <span></span>
      <span></span>
    </button>

  </div>
</header>
